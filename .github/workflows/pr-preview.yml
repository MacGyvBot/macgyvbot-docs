name: Check GitHub Pages Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: write

concurrency:
  group: pages-preview-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-check:
    name: Preview site check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp README.md PROJECT_PROPOSAL.md REQUIREMENT_SPECIFICATION.md CONTRIBUTING.md _site/
          cp -R MACGYVBOT-DECK assets _site/
          touch _site/.nojekyll

      - name: Check expected files
        run: |
          test -f _site/README.md
          test -f _site/PROJECT_PROPOSAL.md
          test -f _site/REQUIREMENT_SPECIFICATION.md
          test -f _site/MACGYVBOT-DECK/index.html
          test -f _site/MACGYVBOT-DECK/styles/deck.css
          test -f _site/MACGYVBOT-DECK/styles/common.css
          test -f _site/MACGYVBOT-DECK/assets/macgyvbot.png

      - name: Smoke test static server
        run: |
          python3 -m http.server 8000 --directory _site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:8000/ > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/MACGYVBOT-DECK/ > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/MACGYVBOT-DECK/styles/deck.css > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/MACGYVBOT-DECK/styles/common.css > /dev/null

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install PDF renderer
        run: npm install --no-save puppeteer-core

      - name: Export deck PDF
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p artifacts
          python3 -m http.server 8000 --directory _site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          node <<'NODE'
          const puppeteer = require('puppeteer-core');

          (async () => {
            const outputPath = `${process.cwd()}/artifacts/macgyvbot-deck-pr-${process.env.PR_NUMBER}.pdf`;
            const browser = await puppeteer.launch({
              executablePath: process.env.CHROME_PATH,
              headless: 'new',
              args: [
                '--disable-gpu',
                '--no-sandbox',
                '--font-render-hinting=none',
              ],
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 1 });
            await page.goto('http://127.0.0.1:8000/MACGYVBOT-DECK/', {
              waitUntil: ['load', 'networkidle0'],
              timeout: 60000,
            });
            await page.evaluate(async () => {
              await Promise.all(
                Array.from(document.images)
                  .filter((image) => !image.complete)
                  .map((image) => new Promise((resolve, reject) => {
                    image.addEventListener('load', resolve, { once: true });
                    image.addEventListener('error', reject, { once: true });
                  }))
              );

              if (document.fonts) {
                const fontLoads = [400, 500, 600, 700, 800, 900].map((weight) =>
                  document.fonts.load(`${weight} 24px Paperlogy`, 'MacGyvBot 한글 테스트')
                );
                await Promise.all(fontLoads);
                await document.fonts.ready;

                const ready = [400, 700, 800].every((weight) =>
                  document.fonts.check(`${weight} 24px Paperlogy`, 'MacGyvBot 한글 테스트')
                );
                if (!ready) {
                  throw new Error('Paperlogy webfont did not finish loading');
                }
              }
            });
            await page.emulateMediaType('print');
            await page.pdf({
              path: outputPath,
              width: '1280px',
              height: '720px',
              printBackground: true,
              preferCSSPageSize: true,
              displayHeaderFooter: false,
              margin: { top: 0, right: 0, bottom: 0, left: 0 },
            });
            await browser.close();
          })();
          NODE
          test -s "artifacts/macgyvbot-deck-pr-${PR_NUMBER}.pdf"

      - name: Upload deck PDF artifact
        id: upload-pdf
        uses: actions/upload-artifact@v4
        with:
          name: macgyvbot-deck-pdf-pr-${{ github.event.pull_request.number }}
          path: artifacts/macgyvbot-deck-pr-${{ github.event.pull_request.number }}.pdf
          if-no-files-found: error

      - name: Comment PDF artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- macgyvbot-deck-pdf-artifact -->';
            const artifactName = 'macgyvbot-deck-pdf-pr-${{ github.event.pull_request.number }}';
            const artifactUrl = '${{ steps.upload-pdf.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## MacGyvBot Deck PDF

            PDF artifact has been generated for this PR.

            - Artifact: [${artifactName}](${artifactUrl})
            - Workflow run: [Check GitHub Pages Preview](${runUrl})

            Note: GitHub may require sign-in to download Actions artifacts.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Mark PR artifact deployment
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.upload-pdf.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { owner, repo } = context.repo;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: context.payload.pull_request.head.sha,
              auto_merge: false,
              required_contexts: [],
              environment: 'pr-pdf-artifact',
              description: 'MacGyvBot deck PDF artifact',
              transient_environment: true,
              production_environment: false,
            });

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.id,
              state: 'success',
              environment_url: artifactUrl,
              log_url: runUrl,
              description: 'PDF artifact uploaded',
            });
