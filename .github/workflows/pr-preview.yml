name: Check GitHub Pages Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - README.md
      - PROJECT_PROPOSAL.md
      - REQUIREMENT_SPECIFICATION.md
      - MACGYVBOT-DECK/**
      - assets/**
      - .github/workflows/pr-preview.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pages-preview-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-check:
    name: Preview site check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp README.md PROJECT_PROPOSAL.md REQUIREMENT_SPECIFICATION.md CONTRIBUTING.md _site/
          cp -R MACGYVBOT-DECK assets _site/
          touch _site/.nojekyll

      - name: Check expected files
        run: |
          test -f _site/README.md
          test -f _site/PROJECT_PROPOSAL.md
          test -f _site/REQUIREMENT_SPECIFICATION.md
          test -f _site/MACGYVBOT-DECK/index.html
          test -f _site/MACGYVBOT-DECK/styles/deck.css
          test -f _site/MACGYVBOT-DECK/styles/common.css
          test -f _site/MACGYVBOT-DECK/assets/macgyvbot.png

      - name: Smoke test static server
        run: |
          python3 -m http.server 8000 --directory _site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:8000/ > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/MACGYVBOT-DECK/ > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/MACGYVBOT-DECK/styles/deck.css > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/MACGYVBOT-DECK/styles/common.css > /dev/null

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Export deck PDF
        run: |
          mkdir -p artifacts
          python3 -m http.server 8000 --directory _site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          "${{ steps.setup-chrome.outputs.chrome-path }}" \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf="$PWD/artifacts/macgyvbot-deck-pr-${{ github.event.pull_request.number }}.pdf" \
            --print-to-pdf-no-header \
            http://127.0.0.1:8000/MACGYVBOT-DECK/
          test -s "artifacts/macgyvbot-deck-pr-${{ github.event.pull_request.number }}.pdf"

      - name: Upload deck PDF artifact
        id: upload-pdf
        uses: actions/upload-artifact@v4
        with:
          name: macgyvbot-deck-pdf-pr-${{ github.event.pull_request.number }}
          path: artifacts/macgyvbot-deck-pr-${{ github.event.pull_request.number }}.pdf
          if-no-files-found: error

      - name: Comment PDF artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- macgyvbot-deck-pdf-artifact -->';
            const artifactName = 'macgyvbot-deck-pdf-pr-${{ github.event.pull_request.number }}';
            const artifactUrl = '${{ steps.upload-pdf.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## MacGyvBot Deck PDF

            PDF artifact has been generated for this PR.

            - Artifact: [${artifactName}](${artifactUrl})
            - Workflow run: [Check GitHub Pages Preview](${runUrl})

            Note: GitHub may require sign-in to download Actions artifacts.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
